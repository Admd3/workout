<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<meta name="theme-color" content="#08080D">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%2308080D' width='100' height='100' rx='22'/><text y='68' x='50' text-anchor='middle' font-size='52'>🏋️</text></svg>">
<title>Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080D;
    --card: rgba(255,255,255,0.03);
    --card-border: rgba(255,255,255,0.06);
    --text: #fff;
    --text-dim: rgba(255,255,255,0.4);
    --text-faint: rgba(255,255,255,0.2);
    --red: #E63946;
    --blue: #457B9D;
    --gold: #E9C46A;
    --teal: #2A9D8F;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', -apple-system, sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* ── Subtle noise texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; padding-bottom: 100px; }

  /* ── Header ── */
  .header {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--card-border);
    transition: background 0.4s ease;
  }
  .header-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 1.5px;
    line-height: 1;
    margin-bottom: 16px;
  }
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-track {
    flex: 1;
    height: 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.07);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    min-width: 36px;
    text-align: right;
  }

  /* ── Day Tabs ── */
  .day-tabs {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex: 1;
    min-width: 76px;
    padding: 12px 8px 10px;
    border-radius: 12px;
    border: 2px solid var(--card-border);
    background: var(--card);
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    -webkit-user-select: none;
    user-select: none;
  }
  .day-tab.active {
    border-color: var(--day-color);
    background: color-mix(in srgb, var(--day-color) 10%, transparent);
  }
  .day-tab .icon { font-size: 20px; }
  .day-tab .label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .day-tab.active .label { color: var(--text); }
  .day-tab .pct {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    margin-top: 2px;
    color: var(--day-color);
  }

  /* ── Exercise Cards ── */
  .exercise-list { padding: 0 16px; }

  .exercise-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: all 0.3s;
  }
  .exercise-card.done {
    border-color: color-mix(in srgb, var(--day-color) 30%, transparent);
    background: color-mix(in srgb, var(--day-color) 6%, transparent);
  }

  .exercise-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }

  .ex-num {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-faint);
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .exercise-card.done .ex-num {
    background: var(--day-color);
    color: #fff;
  }

  .ex-info { flex: 1; min-width: 0; }
  .ex-name {
    font-size: 15px;
    font-weight: 600;
    transition: all 0.3s;
  }
  .exercise-card.done .ex-name {
    text-decoration: line-through;
    opacity: 0.45;
  }
  .ex-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .ex-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-faint);
  }
  .ex-chevron {
    font-size: 10px;
    color: var(--text-faint);
    transition: transform 0.25s;
  }
  .ex-chevron.open { transform: rotate(180deg); }

  /* ── Sets Panel ── */
  .sets-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .sets-panel.open { max-height: 600px; }

  .sets-inner {
    padding: 0 16px 14px;
  }
  .sets-divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin-bottom: 6px;
  }

  .set-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 0;
  }

  .set-check {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.14);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    color: transparent;
    font-size: 15px;
  }
  .set-check.checked {
    border: none;
    background: var(--day-color);
    color: #fff;
  }

  .set-label {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    transition: all 0.2s;
  }
  .set-label.checked {
    color: rgba(255,255,255,0.25);
    text-decoration: line-through;
  }

  /* ── Rest Timer ── */
  .rest-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 5px 12px;
    min-width: 72px;
    text-align: center;
    background: rgba(255,255,255,0.04);
    color: var(--text-dim);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
  }
  .rest-btn.running {
    color: #fff;
    border-color: color-mix(in srgb, var(--day-color) 40%, transparent);
  }
  .rest-btn .fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: color-mix(in srgb, var(--day-color) 25%, transparent);
    border-radius: 8px;
    transition: width 1s linear;
  }
  .rest-btn span { position: relative; z-index: 1; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 28px 20px 0;
  }
  .footer-done {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    animation: pulse 1.6s ease-in-out infinite;
  }
  .footer-hint {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
  }

  /* ── Reset Button ── */
  .reset-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    padding: 12px 20px calc(12px + var(--safe-bottom));
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    display: flex;
    justify-content: center;
    z-index: 10;
  }
  .reset-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-dim);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:active {
    background: rgba(255,0,0,0.15);
    border-color: var(--red);
    color: var(--red);
  }

  /* ── Animations ── */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .exercise-card {
    animation: slideIn 0.35s ease both;
  }
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
// ── Data ──
const WORKOUTS = [
  {
    day: 1, title: "CHEST & TRICEPS", icon: "💪", color: "var(--red)",
    exercises: [
      { name: "Bench Press", sets: 4, reps: "8-10", rest: 90, muscle: "Chest" },
      { name: "Incline Dumbbell Press", sets: 3, reps: "10-12", rest: 75, muscle: "Upper Chest" },
      { name: "Cable Flyes", sets: 3, reps: "12-15", rest: 60, muscle: "Chest" },
      { name: "Tricep Dips", sets: 3, reps: "8-12", rest: 75, muscle: "Triceps" },
      { name: "Overhead Tricep Extension", sets: 3, reps: "10-12", rest: 60, muscle: "Triceps" },
    ]
  },
  {
    day: 2, title: "BACK & BICEPS", icon: "🏋️", color: "var(--blue)",
    exercises: [
      { name: "Barbell Rows", sets: 4, reps: "8-10", rest: 90, muscle: "Back" },
      { name: "Pull-ups / Lat Pulldowns", sets: 4, reps: "8-12", rest: 90, muscle: "Lats" },
      { name: "Seated Cable Rows", sets: 3, reps: "10-12", rest: 75, muscle: "Mid Back" },
      { name: "Face Pulls", sets: 3, reps: "15-20", rest: 60, muscle: "Rear Delts" },
      { name: "Barbell Curls", sets: 3, reps: "10-12", rest: 60, muscle: "Biceps" },
      { name: "Hammer Curls", sets: 3, reps: "10-12", rest: 60, muscle: "Biceps" },
    ]
  },
  {
    day: 3, title: "SHOULDERS & CORE", icon: "🔥", color: "var(--gold)",
    exercises: [
      { name: "Overhead Press", sets: 4, reps: "8-10", rest: 90, muscle: "Shoulders" },
      { name: "Lateral Raises", sets: 4, reps: "12-15", rest: 60, muscle: "Side Delts" },
      { name: "Reverse Flyes", sets: 3, reps: "12-15", rest: 60, muscle: "Rear Delts" },
      { name: "Shrugs", sets: 3, reps: "12-15", rest: 60, muscle: "Traps" },
      { name: "Hanging Leg Raises", sets: 3, reps: "12-15", rest: 60, muscle: "Core" },
      { name: "Cable Crunches", sets: 3, reps: "15-20", rest: 45, muscle: "Core" },
      { name: "Plank", sets: 3, reps: "45-60s", rest: 45, muscle: "Core" },
    ]
  },
  {
    day: 4, title: "LEGS", icon: "⚡", color: "var(--teal)",
    exercises: [
      { name: "Squats", sets: 4, reps: "6-8", rest: 120, muscle: "Quads/Glutes" },
      { name: "Romanian Deadlifts", sets: 4, reps: "8-10", rest: 90, muscle: "Hamstrings" },
      { name: "Leg Press", sets: 3, reps: "10-12", rest: 90, muscle: "Quads" },
      { name: "Walking Lunges", sets: 3, reps: "12 each", rest: 75, muscle: "Quads/Glutes" },
      { name: "Calf Raises", sets: 4, reps: "15-20", rest: 60, muscle: "Calves" },
    ]
  }
];

// ── State ──
let activeDay = 0;
let expandedEx = null;
let completed = JSON.parse(localStorage.getItem('wt_done') || '{}');
let timers = {};

function save() { localStorage.setItem('wt_done', JSON.stringify(completed)); }

function getColor(dayIdx) {
  return ['#E63946','#457B9D','#E9C46A','#2A9D8F'][dayIdx];
}

function dayProgress(dayIdx) {
  const w = WORKOUTS[dayIdx];
  const total = w.exercises.reduce((a, e) => a + e.sets, 0);
  const done = w.exercises.reduce((a, e, ei) =>
    a + Array.from({length: e.sets}).filter((_, si) => completed[`${dayIdx}-${ei}-${si}`]).length, 0);
  return total ? Math.round(done / total * 100) : 0;
}

// ── Rest Timer Logic ──
function startRest(dayIdx, exIdx, setIdx, seconds) {
  const id = `${dayIdx}-${exIdx}-${setIdx}`;
  if (timers[id]) return;
  
  timers[id] = { left: seconds, total: seconds };
  
  const interval = setInterval(() => {
    timers[id].left--;
    updateRestBtn(id);
    if (timers[id].left <= 0) {
      clearInterval(interval);
      delete timers[id];
      updateRestBtn(id);
    }
  }, 1000);
  
  updateRestBtn(id);
}

function updateRestBtn(id) {
  const btn = document.querySelector(`[data-rest="${id}"]`);
  if (!btn) return;
  const t = timers[id];
  if (t) {
    btn.classList.add('running');
    btn.querySelector('span').textContent = `${t.left}s`;
    btn.querySelector('.fill').style.width = `${(t.left / t.total) * 100}%`;
  } else {
    btn.classList.remove('running');
    const rest = btn.dataset.seconds;
    btn.querySelector('span').textContent = `⏱ ${rest}s`;
    btn.querySelector('.fill').style.width = '0%';
  }
}

// ── Render ──
function render() {
  const w = WORKOUTS[activeDay];
  const color = getColor(activeDay);
  const total = w.exercises.reduce((a, e) => a + e.sets, 0);
  const done = w.exercises.reduce((a, e, ei) =>
    a + Array.from({length: e.sets}).filter((_, si) => completed[`${activeDay}-${ei}-${si}`]).length, 0);

  document.documentElement.style.setProperty('--day-color', color);

  let html = `
    <div class="header" style="background: ${color}0D; border-color: ${color}33;">
      <div class="header-tag" style="color:${color}">4-Day Split</div>
      <div class="header-title">${w.icon} ${w.title}</div>
      <div class="progress-row">
        <div class="progress-track">
          <div class="progress-fill" style="width:${total?done/total*100:0}%;background:${color}"></div>
        </div>
        <div class="progress-label">${done}/${total}</div>
      </div>
    </div>

    <div class="day-tabs">
      ${WORKOUTS.map((d, i) => {
        const p = dayProgress(i);
        const c = getColor(i);
        return `<div class="day-tab ${i===activeDay?'active':''}" style="--day-color:${c}" onclick="switchDay(${i})">
          <div class="icon">${d.icon}</div>
          <div class="label">DAY ${d.day}</div>
          ${p > 0 ? `<div class="pct">${p}%</div>` : ''}
        </div>`;
      }).join('')}
    </div>

    <div class="exercise-list">
      ${w.exercises.map((ex, ei) => {
        const setsDone = Array.from({length: ex.sets}).filter((_, si) => completed[`${activeDay}-${ei}-${si}`]).length;
        const allDone = setsDone === ex.sets;
        const isOpen = expandedEx === ei;

        return `<div class="exercise-card ${allDone?'done':''}" style="animation-delay:${ei*0.05}s;--day-color:${color}">
          <div class="exercise-header" onclick="toggleEx(${ei})">
            <div class="ex-num">${allDone ? '✓' : ei+1}</div>
            <div class="ex-info">
              <div class="ex-name">${ex.name}</div>
              <div class="ex-meta">${ex.muscle} · ${ex.sets}×${ex.reps}</div>
            </div>
            <div class="ex-count">${setsDone}/${ex.sets}</div>
            <div class="ex-chevron ${isOpen?'open':''}">▼</div>
          </div>
          <div class="sets-panel ${isOpen?'open':''}">
            <div class="sets-inner">
              <div class="sets-divider"></div>
              ${Array.from({length: ex.sets}).map((_, si) => {
                const key = `${activeDay}-${ei}-${si}`;
                const isDone = completed[key];
                return `<div class="set-row">
                  <div class="set-check ${isDone?'checked':''}" onclick="toggleSet(${activeDay},${ei},${si})">${isDone?'✓':''}</div>
                  <div class="set-label ${isDone?'checked':''}">Set ${si+1} — ${ex.reps} reps</div>
                  ${isDone ? `<div class="rest-btn" data-rest="${key}" data-seconds="${ex.rest}" onclick="startRest(${activeDay},${ei},${si},${ex.rest})">
                    <div class="fill"></div>
                    <span>⏱ ${ex.rest}s</span>
                  </div>` : ''}
                </div>`;
              }).join('')}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="footer">
      ${done === total && total > 0
        ? `<div class="footer-done" style="color:${color}">🎉 WORKOUT COMPLETE</div>`
        : `<div class="footer-hint">Tap an exercise to expand · Check off sets as you go</div>`
      }
    </div>

    <div class="reset-bar">
      <div class="reset-btn" onclick="resetDay()">RESET TODAY</div>
    </div>
  `;

  document.getElementById('app').innerHTML = html;

  // Restore active timer visuals
  Object.keys(timers).forEach(id => updateRestBtn(id));
}

function switchDay(i) {
  activeDay = i;
  expandedEx = null;
  render();
}

function toggleEx(i) {
  expandedEx = expandedEx === i ? null : i;
  render();
}

function toggleSet(d, e, s) {
  const key = `${d}-${e}-${s}`;
  completed[key] = !completed[key];
  save();
  render();
}

function resetDay() {
  const w = WORKOUTS[activeDay];
  w.exercises.forEach((ex, ei) => {
    for (let si = 0; si < ex.sets; si++) {
      delete completed[`${activeDay}-${ei}-${si}`];
    }
  });
  save();
  render();
}

// ── Service Worker for offline / PWA ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

render();
</script>
</body>
</html>
